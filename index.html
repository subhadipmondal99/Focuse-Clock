<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhadip's FocusClock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="x-icon" href="logo.jpg">
</head>

<body>

    <div id="warning-vignette"></div>

    <header id="main-header">
        <div class="logo">Subhadip's FocusClock</div>
        <div class="header-controls">
            <div class="tabs">
                <button class="tab active" data-target="clock">Clock</button>
                <button class="tab" data-target="timer">Timer</button>
                <button class="tab" data-target="stopwatch">Stopwatch</button>
            </div>
            <button class="icon-btn" id="fullscreen-btn">
                <svg id="fs-icon-expand" viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
                <svg id="fs-icon-shrink" viewBox="0 0 24 24" style="display: none;">
                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />
                </svg>
            </button>
        </div>
    </header>

    <main>
        <div class="pane active" id="clock">
            <div class="clock-container">
                <div class="flip-unit" id="unit-h"></div>
                <div class="colon">:</div>
                <div class="flip-unit" id="unit-m"></div>
                <div class="colon">:</div>
                <div class="flip-unit" id="unit-s"></div>
            </div>
            <div class="clock-meta">
                <div class="clock-date" id="date-display">--</div>
                <div class="clock-ampm" id="ampm-display">--</div>
            </div>
        </div>

        <div class="pane" id="timer">
            <div class="timer-setup" id="timer-setup">
                <div class="input-group">
                    <input type="number" id="t-hours" placeholder="00" min="0" max="99"> :
                    <input type="number" id="t-mins" placeholder="00" min="0" max="59"> :
                    <input type="number" id="t-secs" placeholder="00" min="0" max="59">
                </div>
                <div class="timer-settings">
                    <label>Alarm Tone</label>
                    <select id="tone-select">
                        <option value="bell">Bell</option>
                        <option value="digital">Digital</option>
                        <option value="chime">Chime</option>
                        <option value="beep">Beep</option>
                        <option value="soft">Soft</option>
                        <option value="ringtone">Ringtone</option>
                    </select>
                </div>
                <div class="controls">
                    <button class="btn-primary" id="timer-start">Start</button>
                </div>
            </div>

            <div class="timer-running" id="timer-running">
                <svg class="progress-ring" height="260" width="260">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--accent-start)" />
                            <stop offset="100%" stop-color="var(--accent-end)" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring__circle" stroke-width="8" fill="transparent" r="120" cx="130" cy="130"
                        stroke-linecap="round" />
                </svg>
                <div class="timer-display" id="timer-display">00:00:00</div>
                <div class="controls">
                    <div class="status-dot active" id="timer-status"></div>
                    <button class="btn-primary" id="timer-pause">Pause</button>
                    <button class="btn-secondary" id="timer-reset">Reset</button>
                </div>
            </div>
        </div>

        <div class="pane" id="stopwatch">
            <div class="stopwatch-display">
                <span id="sw-time">00:00</span><span class="stopwatch-cents" id="sw-cents">.00</span>
            </div>
            <div class="controls">
                <button class="btn-primary" id="sw-start">Start</button>
                <button class="btn-secondary" id="sw-lap" disabled>Lap</button>
                <button class="btn-secondary" id="sw-reset">Reset</button>
            </div>
            <div class="lap-list" id="lap-list"></div>
        </div>
    </main>

    <div class="alarm-overlay" id="alarm-overlay">
        <div class="alarm-bell">🔔</div>
        <h2 style="font-family: 'Bebas Neue'; font-size: 3rem; margin-bottom: 2rem;">Time's Up!</h2>
        <button class="btn-primary" id="alarm-dismiss">Dismiss</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
